name: lanchpad
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies
dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  flutter_app_name: ^0.1.1
flutter_app_name:
  name: "Bit The Hits"

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: BBH
      fonts:
        - asset: fonts/BBHSansBartle-Regular.ttf
    - family: mono 
      fonts:
        - asset: fonts/Michroma-Regular.ttf
